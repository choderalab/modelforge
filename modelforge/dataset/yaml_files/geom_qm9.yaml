dataset: geom_qm9
latest: full_dataset_v1.0
latest_test: nc_1000_v1.0

description: "The Geometric Ensemble Of Molecules (GEOM) dataset contains conformers for 133,000 species from the QM9 dataset.
              Conformer structures were generated with CREST and GFN2-XTB.  Energies were evaluated using
              DFT via ORCA 5.0.2  using the r2scan-3c functional and mTZVPP basis.

              Citation:   Axelrod, S., Gómez-Bombarelli, R.
                GEOM, energy-annotated molecular conformations for property prediction and molecular generation.
                Sci Data 9, 185 (2022).
                https://doi.org/10.1038/s41597-022-01288-4
                
              DOI for dataset: https://doi.org/10.7910/DVN/JNGTDF
              Download link for qm9 subset of the GEOM dataset:  https://dataverse.harvard.edu/api/access/datafile/4327190"

atomic_self_energies:
  H: -1371.0299090833762*kilojoule_per_mole
  C: -5550.745837803016*kilojoule_per_mole
  N: -7650.888382254842*kilojoule_per_mole
  O: -10665.859516299233*kilojoule_per_mole
  F: -12438.055931502735*kilojoule_per_mole


full_dataset_v1.0:
  about: "This provides a curated hdf5 file for the GEOM qm9 dataset designed to be
    compatible with modelforge. This dataset contains 133258 unique records for 1822137
    total configurations. Note, the dataset comes from GEOM which uses gfn2-xtb and
    CREST to generate conformers."
  hdf5_schema: 2
  available_properties:
  - atomic_numbers
  - positions
  - total_charge
  - dft_total_energy
