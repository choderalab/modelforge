name: modelforge-ase-examples
channels:
  - conda-forge
  - pytorch
dependencies:
  # Base modelforge runtime dependencies
  - python
  - pip
  - h5py
  - tqdm
  - toml
  - qcportal>=0.50
  - qcelemental
  - pytorch>=2.1
  - loguru
  - lightning>=2.0.8
  - tensorboard
  - torchvision
  - openff-units>=0.3.1
  - torchmetrics>=1.4
  - pint>=0.24.1
  - rdkit
  - retry
  - sqlitedict
  - pydantic>=2
  - ray-all
  - graphviz
  - wandb>=0.18.5
  - tad-dftd3
  - tad-mctc

  # ASE integration + notebook/example dependencies
  - ase
  - ipykernel
  - nglview
  - ipywidgets
  - jupyterlab
  - jax
  - flax
